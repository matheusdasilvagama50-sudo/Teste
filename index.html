<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Ultra Dashboard</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #f093fb;
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, var(--bg));
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Efeito de Fundo Animado */
        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(100%, 50%); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Glassmorphism Cards */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .btn-fancy {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            transition: scale 0.2s;
        }

        .btn-fancy:active { scale: 0.95; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        .price-badge {
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        #logList li {
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>

<div class="blob"></div>
<div class="container">
    <div class="header" id="mainHeader">
        <div>
            <h1 style="margin: 0; font-size: 2.5em; background: linear-gradient(to right, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                Nexa Pro <span style="font-weight: 200;">Pulse</span>
            </h1>
            <p style="opacity: 0.6;">Sincronizado com o mercado global</p>
        </div>
        <button class="btn-fancy" onclick="ui.refreshUI()">
            <i class="fas fa-sync-alt"></i> ATUALIZAR
        </button>
    </div>

    <div class="grid">
        <!-- Input Lateral -->
        <div class="card" id="formCard">
            <h3><i class="fas fa-plus-circle"></i> Novo Ativo</h3>
            <div style="display: flex; flex-direction: column;">
                <input type="text" id="coinName" placeholder="Ativo (Ex: BTC, Solana...)">
                <input type="number" id="coinAmount" placeholder="Quantidade">
                <input type="number" id="buyPrice" placeholder="Preço de Compra ($)">
                <button class="btn-fancy" onclick="engine.saveData()">CADASTRAR</button>
            </div>
        </div>

        <!-- Estatísticas Mercado -->
        <div class="card" id="marketCard">
            <h3><i class="fas fa-chart-line"></i> Mercado Real-Time</h3>
            <div id="pricesUI"></div>
        </div>

        <!-- Gráfico -->
        <div class="card" id="chartCard" style="grid-column: span 1;">
            <h3><i class="fas fa-chart-pie"></i> Composição</h3>
            <canvas id="mainChart" width="400" height="250"></canvas>
        </div>
    </div>

    <!-- Lista -->
    <div class="card" style="margin-top: 25px;">
        <h3><i class="fas fa-history"></i> Atividades Recentes</h3>
        <ul id="logList" style="list-style: none; padding: 0;"></ul>
    </div>
</div>

<script>
/**
 * LÓGICA CORE COM ENGINE DE ANIMAÇÃO
 */
const engine = {
    data: JSON.parse(localStorage.getItem('nexa_data')) || [],

    saveData() {
        const name = document.getElementById('coinName').value;
        const amount = document.getElementById('coinAmount').value;
        
        if(!name || !amount) return ui.shake(document.getElementById('formCard'));

        const entry = { name, amount, id: Math.random() };
        this.data.push(entry);
        localStorage.setItem('nexa_data', JSON.stringify(this.data));
        
        ui.renderAll();
        gsap.from("#logList li:first-child", { x: -30, opacity: 0, duration: 0.5 });
    }
};

const ui = {
    chart: null,

    init() {
        // Animação inicial de entrada com GSAP
        gsap.from(".card", {
            y: 50,
            opacity: 0,
            duration: 0.8,
            stagger: 0.2,
            ease: "power2.out"
        });
        this.renderAll();
        this.fetchPrices();
    },

    async fetchPrices() {
        const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,binancecoin,solana&vs_currencies=usd');
        const data = await res.json();
        const container = document.getElementById('pricesUI');
        
        container.innerHTML = Object.entries(data).map(([key, val]) => `
            <div class="price-badge">
                <span style="text-transform: capitalize">${key}</span>
                <span class="price-val" style="color: var(--primary); font-weight: bold">$${val.usd}</span>
            </div>
        `).join('');

        gsap.from(".price-val", { innerText: 0, duration: 2, snap: { innerText: 1 } });
    },

    renderAll() {
        this.renderLogs();
        this.renderChart();
    },

    renderLogs() {
        const list = document.getElementById('logList');
        list.innerHTML = engine.data.slice().reverse().map(i => `
            <li>
                <i class="fas fa-wallet" style="color: var(--primary)"></i> 
                Comprado <strong>${i.amount}</strong> de <strong>${i.name}</strong>
            </li>
        `).join('');
    },

    renderChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        const grouped = engine.data.reduce((acc, curr) => {
            acc[curr.name] = (acc[curr.name] || 0) + parseFloat(curr.amount);
            return acc;
        }, {});

        if(this.chart) this.chart.destroy();
        
        this.chart = new Chart(ctx, {
            type: 'polarArea',
            data: {
                labels: Object.keys(grouped),
                datasets: [{
                    data: Object.values(grouped),
                    backgroundColor: ['#00f2fe77', '#4facfe77', '#f093fb77', '#6366f177'],
                    borderColor: '#ffffff22'
                }]
            },
            options: {
                plugins: { legend: { display: false } },
                scales: { r: { grid: { color: '#ffffff11' }, ticks: { display: false } } }
            }
        });
    },

    shake(el) {
        gsap.to(el, { x: 10, duration: 0.1, repeat: 5, yoyo: true });
    },

    refreshUI() {
        gsap.to(".container", { opacity: 0.5, duration: 0.3, onComplete: () => {
            this.fetchPrices();
            gsap.to(".container", { opacity: 1, duration: 0.3 });
        }});
    }
};

window.onload = () => ui.init();
</script>

</body>
</html>
