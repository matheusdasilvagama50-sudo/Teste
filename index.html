<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Capital | Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --primary: #6366f1;
            --secondary: #a855f7;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #f43f5e;
        }

        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            display: flex;
            min-height: 100vh;
        }

        /* SIDEBAR FIXA */
        .sidebar {
            width: 260px;
            background: var(--card);
            border-right: 1px solid rgba(255,255,255,0.05);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 40px; }

        .menu-item {
            padding: 15px;
            border-radius: 12px;
            color: var(--text-dim);
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.3s;
        }

        .menu-item.active, .menu-item:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* CONTEÚDO PRINCIPAL */
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
            width: calc(100% - 260px); /* Previne que o conteúdo estique */
        }

        /* GRID GIGANTE */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-full { grid-column: span 3; }
        .card-main { grid-column: span 2; background: linear-gradient(135deg, var(--primary), var(--secondary)); }

        .balance-title { font-size: 0.9rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .balance-value { font-size: 3.5rem; font-weight: 800; margin: 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* INPUTS */
        .form-group { display: flex; gap: 15px; margin-top: 20px; }
        input {
            flex: 1;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px;
            border-radius: 14px;
            color: white;
            font-size: 1rem;
        }

        .btn {
            padding: 18px 30px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-success { background: var(--success); color: white; }
        .btn-success:active { transform: scale(0.98); }

        /* LISTA DE TRANSAÇÕES */
        .history-list { margin-top: 30px; }
        .item {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .card-main, .card-full { grid-column: span 1; }
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .logo, .sidebar span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); padding: 20px; }
            .balance-value { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">NX</div>
        <div class="menu-item active"><span>Dashboard</span></div>
        <div class="menu-item"><span>Carteira</span></div>
        <div class="menu-item"><span>Relatórios</span></div>
        <div class="menu-item"><span>Configurações</span></div>
    </nav>

    <div class="main-content">
        <header style="margin-bottom: 40px;">
            <h1 style="font-size: 2rem;">Central de Rendimentos</h1>
            <p style="color: var(--text-dim)">Bem-vindo ao seu painel administrativo.</p>
        </header>

        <div class="dashboard-grid">
            <!-- CARD GIGANTE DE SALDO -->
            <div class="card card-main">
                <p class="balance-title">Patrimônio Líquido</p>
                <div class="balance-value">R$ <span id="valDisplay">0,00</span></div>
                <div style="font-weight: 600;">Status: Conta Premium Ativa</div>
            </div>

            <!-- ADICIONAR RENDA -->
            <div class="card">
                <h3>Nova Entrada</h3>
                <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 15px;">Adicione seus lucros aqui.</p>
                <input type="text" id="itemName" placeholder="Origem: Ex: Vendas">
                <input type="number" id="itemValue" placeholder="Valor R$">
                <button class="btn btn-success" style="width: 100%; margin-top: 10px;" onclick="addRenda()">Lançar Rendimento</button>
            </div>

            <!-- LISTA DE HISTÓRICO -->
            <div class="card card-full">
                <h3>Histórico de Transações</h3>
                <div class="history-list" id="history">
                    <p style="color: var(--text-dim); text-align: center; padding: 20px;">Nenhuma movimentação hoje.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica segura sem animações infinitas para não travar o GitHub
        let saldoAtual = parseFloat(localStorage.getItem('nexa_saldo')) || 0;

        function atualizarTela() {
            // Atualiza o saldo com formatação brasileira simples e segura
            document.getElementById('valDisplay').innerText = saldoAtual.toLocaleString('pt-br', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            localStorage.setItem('nexa_saldo', saldoAtual);
        }

        function addRenda() {
            const nomeInput = document.getElementById('itemName');
            const valorInput = document.getElementById('itemValue');
            
            const nome = nomeInput.value;
            const valor = parseFloat(valorInput.value);

            if (!nome || isNaN(valor)) return alert("Preencha os dados corretamente!");

            // Atualiza saldo
            saldoAtual += valor;
            atualizarTela();

            // Adiciona no histórico visual
            const lista = document.getElementById('history');
            
            // Remove o texto de "vazio" se for o primeiro item
            if (lista.innerHTML.includes("Nenhuma movimentação")) lista.innerHTML = "";

            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <div>
                    <strong>${nome}</strong>
                    <div style="font-size: 0.7rem; color: var(--text-dim)">${new Date().toLocaleDateString()}</div>
                </div>
                <div style="color: var(--success); font-weight: 800">+ R$ ${valor.toLocaleString('pt-br', {minimumFractionDigits: 2})}</div>
            `;
            lista.prepend(div);

            // Limpa campos
            nomeInput.value = "";
            valorInput.value = "";
        }

        // Inicia o site
        atualizarTela();
    </script>
</body>
</html>
