<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexa Capital Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030712;
            --surface: #111827;
            --primary: #8b5cf6;
            --secondary: #d946ef;
            --success: #10b981;
            --error: #f43f5e;
            --text: #f8fafc;
        }

        * { margin:0; padding:0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* HEADER */
        header { padding: 30px 20px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info h2 { font-size: 1.2rem; font-weight: 800; }
        .user-info p { font-size: 0.8rem; color: #94a3b8; }

        /* CONTAINER PRINCIPAL */
        .app-container { padding: 0 20px 100px; max-width: 500px; margin: 0 auto; }

        /* CARD DE SALDO */
        .main-card {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
            position: relative;
            overflow: hidden;
        }
        .main-card::before {
            content: ""; position: absolute; top: -50%; right: -20%; width: 200px; height: 200px;
            background: rgba(255,255,255,0.1); border-radius: 50%;
        }

        /* SEÇÕES (Abas) */
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* GRID DE FATURAS */
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .fatura-list { display: flex; flex-direction: column; gap: 12px; }
        .fatura-item {
            background: var(--surface);
            padding: 16px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .fatura-icon { 
            width: 45px; height: 45px; background: rgba(255,255,255,0.05); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }

        /* BARRA DE NAVEGAÇÃO SUPERIOR (ABAS) */
        .nav-tabs {
            display: flex; background: var(--surface); border-radius: 15px; padding: 5px; margin-bottom: 25px;
        }
        .nav-tabs button {
            flex: 1; border: none; background: transparent; color: #94a3b8; padding: 10px;
            border-radius: 12px; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: 0.3s;
        }
        .nav-tabs button.active { background: #1f2937; color: white; }

        /* INPUTS */
        .input-group { background: var(--surface); padding: 20px; border-radius: 24px; margin-top: 15px; }
        input {
            width: 100%; background: #1f2937; border: none; padding: 15px; 
            border-radius: 12px; color: white; margin-bottom: 10px; font-size: 1rem;
        }

        .btn-action {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            color: white; cursor: pointer; margin-top: 5px;
        }

        /* NAVIGATION BAR FIXA */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17, 24, 39, 0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-around;
            padding: 15px 0 30px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #64748b; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .nav-item svg { width: 24px; height: 24px; fill: currentColor; }

    </style>
</head>
<body>

    <header>
        <div class="user-info">
            <p>Bem-vindo,</p>
            <h2 id="userName">Usuário Nexa</h2>
        </div>
        <div style="width: 45px; height: 45px; background: var(--surface); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
            <svg style="width: 20px; fill: var(--primary);" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </header>

    <div class="app-container">
        
        <!-- ABAS DE NAVEGAÇÃO -->
        <div class="nav-tabs">
            <button class="active" onclick="app.switchTab('resumo', this)">Resumo</button>
            <button onclick="app.switchTab('transacoes', this)">Transações</button>
            <button onclick="app.switchTab('faturas', this)">Faturas</button>
        </div>

        <!-- SEÇÃO 1: RESUMO -->
        <section id="resumo" class="view-section active">
            <div class="main-card">
                <p style="opacity: 0.8; font-size: 0.9rem;">Saldo Total</p>
                <div style="font-size: 2.2rem; font-weight: 800; margin: 5px 0;">R$ <span id="balanceDisplay">0,00</span></div>
                <div style="background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px; display: inline-block; font-size: 0.7rem;">
                    Nexa Premium Gold
                </div>
            </div>

            <div class="section-title">Ações Rápidas</div>
            <div class="input-group">
                <input type="text" id="desc" placeholder="Ex: Salário, Netflix...">
                <input type="number" id="amt" placeholder="R$ 0,00">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-action" style="background: var(--success);" onclick="app.handleAction(true)">+ Receber</button>
                    <button class="btn-action" style="background: var(--error);" onclick="app.handleAction(false)">- Pagar</button>
                </div>
            </div>
        </section>

        <!-- SEÇÃO 2: TRANSAÇÕES -->
        <section id="transacoes" class="view-section">
            <div class="section-title">Histórico</div>
            <div id="historyList" class="fatura-list">
                <!-- Dinâmico -->
            </div>
        </section>

        <!-- SEÇÃO 3: FATURAS -->
        <section id="faturas" class="view-section">
            <div class="section-title">Faturas Pendentes</div>
            <div class="fatura-list" id="pendingBills">
                <!-- Faturas pré-setadas para exemplo profissional -->
                <div class="fatura-item">
                    <div class="fatura-icon">⚡</div>
                    <div style="flex:1"><h4>Conta de Luz</h4><p style="font-size:0.7rem; color:#94a3b8">Vence em 5 dias</p></div>
                    <div style="color:var(--error); font-weight:800">R$ 180,00</div>
                </div>
                <div class="fatura-item">
                    <div class="fatura-icon">🌐</div>
                    <div style="flex:1"><h4>Internet Fibra</h4><p style="font-size:0.7rem; color:#94a3b8">Vence em 12 dias</p></div>
                    <div style="color:var(--error); font-weight:800">R$ 99,90</div>
                </div>
            </div>
        </section>
    </div>

    <!-- NAVBAR INFERIOR -->
    <div class="bottom-nav">
        <div class="nav-item active">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span style="font-size: 0.6rem;">Início</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            <span style="font-size: 0.6rem;">Extrato</span>
        </div>
        <div class="nav-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            <span style="font-size: 0.6rem;">Info</span>
        </div>
    </div>

    <script>
        const app = {
            saldo: parseFloat(localStorage.getItem('n_saldo')) || 0,
            historico: JSON.parse(localStorage.getItem('n_history')) || [],

            init() {
                this.updateDisplay();
                this.renderHistory();
                
                // Animação inicial
                gsap.from(".main-card", { scale: 0.8, opacity: 0, duration: 0.8, ease: "back.out" });
            },

            switchTab(targetId, btn) {
                // Remove active de todos
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
                
                // Ativa a correta
                document.getElementById(targetId).classList.add('active');
                btn.classList.add('active');
                
                gsap.from(`#${targetId}`, { y: 20, opacity: 0, duration: 0.3 });
            },

            handleAction(isAdding) {
                const desc = document.getElementById('desc').value;
                const amt = parseFloat(document.getElementById('amt').value);

                if(!desc || isNaN(amt)) return this.shake();

                this.saldo += isAdding ? amt : -amt;
                this.historico.unshift({
                    id: Date.now(),
                    desc,
                    amt,
                    type: isAdding ? 'up' : 'down',
                    date: new Date().toLocaleTimeString('pt-br', {hour:'2-digit', minute:'2-digit'})
                });

                this.save();
                this.updateDisplay();
                this.renderHistory();

                document.getElementById('desc').value = '';
                document.getElementById('amt').value = '';
            },

            updateDisplay() {
                const display = document.getElementById('balanceDisplay');
                gsap.to(display, {
                    innerText: this.saldo,
                    duration: 1,
                    snap: { innerText: 0.01 },
                    onUpdate: () => display.innerText = parseFloat(display.innerText).toLocaleString('pt-br', {minimumFractionDigits: 2})
                });
            },

            renderHistory() {
                const list = document.getElementById('historyList');
                if(this.historico.length === 0) {
                    list.innerHTML = `<p style="text-align:center; opacity:0.5; margin-top:20px;">Nenhuma movimentação</p>`;
                    return;
                }
                list.innerHTML = this.historico.map(i => `
                    <div class="fatura-item">
                        <div class="fatura-icon">${i.type === 'up' ? '💰' : '💸' }</div>
                        <div style="flex:1"><h4>${i.desc}</h4><p style="font-size:0.7rem; color:#94a3b8">${i.date}</p></div>
                        <div style="color:${i.type === 'up' ? 'var(--success)' : 'var(--error)'}; font-weight:800">
                            ${i.type === 'up' ? '+' : '-'} R$ ${i.amt.toLocaleString('pt-br', {minimumFractionDigits: 2})}
                        </div>
                    </div>
                `).join('');
            },

            save() {
                localStorage.setItem('n_saldo', this.saldo);
                localStorage.setItem('n_history', JSON.stringify(this.historico));
            },

            shake() {
                gsap.to(".input-group", { x: 10, duration: 0.1, repeat: 3, yoyo: true });
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
