<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Capital | Alpha Suite</title>
    <!-- Bibliotecas de Alta Performance -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #030712;
            --surface: #0f172a;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar com SVGs */
        nav {
            width: 80px;
            background: var(--surface);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 40px;
        }

        .nav-icon {
            width: 40px;
            height: 40px;
            cursor: pointer;
            transition: 0.3s;
            fill: var(--text-dim);
        }

        .nav-icon:hover { fill: var(--primary); filter: drop-shadow(0 0 8px var(--primary-glow)); }

        /* Main Content */
        main { flex: 1; padding: 40px; }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        /* Widgets Dinâmicos */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: auto auto;
            gap: 24px;
        }

        .glass-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.8));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .balance-hero {
            grid-column: span 2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .stat-value { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin: 10px 0; }
        .stat-label { color: var(--text-dim); text-transform: uppercase; font-size: 0.75rem; font-weight: 600; }

        /* Form Estilizado */
        .trans-input {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
        }

        .btn-prime {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px -5px var(--primary-glow);
        }

        /* Lista de Transações Premium */
        .transaction-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
        .t-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
        }

        .t-info h4 { font-size: 0.9rem; }
        .t-info span { font-size: 0.75rem; color: var(--text-dim); }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .b-up { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .b-down { background: rgba(239, 68, 68, 0.1); color: var(--error); }

    </style>
</head>
<body>

    <nav>
        <!-- Logo SVG -->
        <svg class="nav-icon" viewBox="0 0 24 24" style="fill: var(--primary); margin-bottom: 20px;">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
        </svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"></path></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10z"></path></svg>
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"></path></svg>
    </nav>

    <main>
        <div class="header-section">
            <div>
                <h1 id="welcomeText">Dashboard Alpha</h1>
                <p style="color: var(--text-dim)">Gerenciamento de capital em tempo real</p>
            </div>
            <div style="text-align: right">
                <p id="currentDate" style="font-weight: 600;"></p>
                <span class="badge b-up">Sistema Online</span>
            </div>
        </div>

        <div class="dashboard-grid">
            <!-- Balanço Principal -->
            <div class="glass-card balance-hero">
                <div>
                    <p class="stat-label">Patrimônio Líquido Total</p>
                    <div class="stat-value">R$ <span id="totalBalance">0,00</span></div>
                    <p style="color: var(--success); font-size: 0.8rem;">↑ 12.5% em relação ao mês anterior</p>
                </div>
                <div style="width: 200px; height: 100px;">
                    <canvas id="miniChart"></canvas>
                </div>
            </div>

            <!-- Formulário -->
            <div class="glass-card">
                <h3 style="margin-bottom: 20px;">Nova Operação</h3>
                <input type="text" id="desc" class="trans-input" placeholder="Título da transação">
                <input type="number" id="amt" class="trans-input" placeholder="Valor R$">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-prime" onclick="app.add(true)" style="background: var(--success)">RECEITA</button>
                    <button class="btn-prime" onclick="app.add(false)" style="background: var(--error)">DESPESA</button>
                </div>
            </div>

            <!-- Gráfico de Pizza -->
            <div class="glass-card" style="grid-row: span 1;">
                <h3 style="margin-bottom: 15px;">Alocação</h3>
                <canvas id="pieChart"></canvas>
            </div>

            <!-- Lista Extrato -->
            <div class="glass-card" style="grid-column: span 2;">
                <h3>Atividade Recente</h3>
                <div id="list" class="transaction-list">
                    <!-- Dinâmico -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const app = {
            balance: parseFloat(localStorage.getItem('alpha_bal')) || 0,
            log: JSON.parse(localStorage.getItem('alpha_log')) || [],
            
            init() {
                document.getElementById('currentDate').innerText = new Date().toLocaleDateString('pt-br', {day:'numeric', month:'long'});
                this.updateUI();
                this.initCharts();
                this.animateIn();
            },

            animateIn() {
                gsap.from(".glass-card", {
                    y: 30, opacity: 0, duration: 0.8, stagger: 0.15, ease: "back.out(1.7)"
                });
            },

            add(isRevenue) {
                const d = document.getElementById('desc').value;
                const v = parseFloat(document.getElementById('amt').value);

                if(!d || isNaN(v)) return gsap.to("main", {x: 10, repeat:3, yoyo:true, duration:0.05});

                const amount = isRevenue ? v : -v;
                this.balance += amount;
                
                this.log.unshift({
                    id: Date.now(),
                    desc: d,
                    val: v,
                    type: isRevenue ? 'up' : 'down',
                    time: new Date().toLocaleTimeString('pt-br', {hour:'2-digit', minute:'2-digit'})
                });

                this.save();
                this.updateUI();
                this.updateCharts();
                
                document.getElementById('desc').value = '';
                document.getElementById('amt').value = '';
            },

            updateUI() {
                const el = document.getElementById('totalBalance');
                gsap.to(el, {
                    innerText: this.balance,
                    duration: 1,
                    snap: { innerText: 1 },
                    onUpdate: () => el.innerText = parseFloat(el.innerText).toLocaleString('pt-br', {minimumFractionDigits: 2})
                });

                document.getElementById('list').innerHTML = this.log.map(i => `
                    <div class="t-item">
                        <div class="t-info">
                            <h4>${i.desc}</h4>
                            <span>${i.time}</span>
                        </div>
                        <div class="badge ${i.type === 'up' ? 'b-up' : 'b-down'}">
                            ${i.type === 'up' ? '+' : '-'} R$ ${i.val.toLocaleString('pt-br')}
                        </div>
                    </div>
                `).join('');
            },

            save() {
                localStorage.setItem('alpha_bal', this.balance);
                localStorage.setItem('alpha_log', JSON.stringify(this.log));
            },

            initCharts() {
                // Gráfico de Pizza
                const ctxPie = document.getElementById('pieChart').getContext('2d');
                this.pie = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: ['Entradas', 'Saídas'],
                        datasets: [{
                            data: [1, 1],
                            backgroundColor: ['#10b981', '#ef4444'],
                            borderWidth: 0,
                            hoverOffset: 10
                        }]
                    },
                    options: { 
                        cutout: '80%',
                        plugins: { legend: { position: 'bottom', labels: {color: '#94a3b8', font: {size: 10}} } } 
                    }
                });

                // Mini gráfico de linha
                const ctxLines = document.getElementById('miniChart').getContext('2d');
                this.lines = new Chart(ctxLines, {
                    type: 'line',
                    data: {
                        labels: [1,2,3,4,5,6],
                        datasets: [{
                            data: [30, 45, 35, 60, 50, 70],
                            borderColor: '#6366f1',
                            tension: 0.4,
                            pointRadius: 0,
                            fill: true,
                            backgroundColor: 'rgba(99, 102, 241, 0.1)'
                        }]
                    },
                    options: {
                        plugins: { legend: {display: false} },
                        scales: { x: {display: false}, y: {display: false} }
                    }
                });
                this.updateCharts();
            },

            updateCharts() {
                const up = this.log.filter(i => i.type === 'up').reduce((a, b) => a + b.val, 0);
                const down = this.log.filter(i => i.type === 'down').reduce((a, b) => a + b.val, 0);
                
                this.pie.data.datasets[0].data = [up || 1, down || 1];
                this.pie.update();
            }
        };

        window.onload = () => app.init();
    </script>
</body>
    </html>
