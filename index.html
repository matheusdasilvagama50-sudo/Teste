<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Crypto Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        input, button {
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-bottom: 10px;
        }
        button {
            background: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { opacity: 0.9; }
        .price-up { color: #4ade80; }
        .price-down { color: #f87171; }
        #logList {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }
        #logList li {
            padding: 8px;
            border-bottom: 1px solid #334155;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Nexa Crypto Tracker</h1>
        <button onclick="tracker.fetchPrices()">Atualizar Preços</button>
    </div>

    <div class="grid">
        <!-- Input Card -->
        <div class="card">
            <h3>Adicionar Transação</h3>
            <div style="display: flex; flex-direction: column;">
                <input type="text" id="coinName" placeholder="Ex: Bitcoin">
                <input type="number" id="coinAmount" placeholder="Quantidade (ex: 0.05)">
                <button onclick="tracker.addTransaction()">Salvar no Portfólio</button>
            </div>
            <h4>Histórico Local</h4>
            <ul id="logList"></ul>
        </div>

        <!-- Chart Card -->
        <div class="card">
            <h3>Distribuição da Carteira</h3>
            <canvas id="myChart"></canvas>
        </div>

        <!-- Market Card -->
        <div class="card">
            <h3>Preços de Mercado (API)</h3>
            <div id="marketData">Carregando...</div>
        </div>
    </div>
</div>

<script>
/**
 * Nexa Crypto Tracker Core Logic
 * Programação funcional e baseada em classes
 */
class CryptoTracker {
    constructor() {
        this.transactions = JSON.parse(localStorage.getItem('crypto_tasks')) || [];
        this.chart = null;
        this.init();
    }

    init() {
        this.renderLogs();
        this.renderChart();
        this.fetchPrices();
    }

    // Gerenciamento de Transações (CRUD & LocalStorage)
    addTransaction() {
        const name = document.getElementById('coinName').value;
        const amount = parseFloat(document.getElementById('coinAmount').value);

        if (!name || isNaN(amount)) {
            alert("Preencha os campos corretamente!");
            return;
        }

        const entry = { id: Date.now(), name, amount, date: new Date().toLocaleString() };
        this.transactions.push(entry);
        localStorage.setItem('crypto_tasks', JSON.stringify(this.transactions));
        
        this.renderLogs();
        this.renderChart();
        document.getElementById('coinName').value = '';
        document.getElementById('coinAmount').value = '';
    }

    renderLogs() {
        const list = document.getElementById('logList');
        list.innerHTML = this.transactions.reverse().map(t => `
            <li><strong>${t.name}</strong>: ${t.amount} unidades <br> <small>${t.date}</small></li>
        `).join('');
    }

    // Integração com API (Fetch API & Async/Await)
    async fetchPrices() {
        const container = document.getElementById('marketData');
        container.innerHTML = "Atualizando...";
        
        try {
            // Usando a API pública da CoinGecko
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,cardano&vs_currencies=usd');
            const data = await response.json();
            
            container.innerHTML = `
                <p>BTC: <span class="price-up">$${data.bitcoin.usd}</span></p>
                <p>ETH: <span class="price-up">$${data.ethereum.usd}</span></p>
                <p>ADA: <span class="price-up">$${data.cardano.usd}</span></p>
            `;
        } catch (error) {
            container.innerHTML = "Erro ao carregar preços.";
            console.error("Erro na API:", error);
        }
    }

    // Manipulação de Gráficos (Chart.js)
    renderChart() {
        const ctx = document.getElementById('myChart').getContext('2d');
        
        // Agrupar dados para o gráfico
        const dataMap = {};
        this.transactions.forEach(t => {
            dataMap[t.name] = (dataMap[t.name] || 0) + t.amount;
        });

        const labels = Object.keys(dataMap);
        const values = Object.values(dataMap);

        if (this.chart) this.chart.destroy();

        this.chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: values,
                    backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#f59e0b', '#10b981'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom', labels: { color: '#f8fafc' } }
                }
            }
        });
    }
}

// Inicializar a aplicação
const tracker = new CryptoTracker();
</script>

</body>
</html>
